name: Rust Tests

on:
  push:
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'examples/**'
      - 'benchmarks/**'
      - '.gitignore'
      - 'LICENSE.txt'
      - 'stratum/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/copilot-instructions.md'
      - '.github/instructions/**'
    branches: [main, master]
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'examples/**'
      - 'benchmarks/**'
      - '.gitignore'
      - 'LICENSE.txt'
      - 'stratum/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/copilot-instructions.md'
      - '.github/instructions/**'
    branches: [main, master]
  workflow_dispatch:

jobs:
  rust-test:
    name: Rust Tests - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-14
          - windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install OS specific dependencies
        if: matrix.os == 'macos-14'
        run: |
          brew update
          brew install libomp

      - name: Cache Cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            _rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('_rust/Cargo.lock') }}

      - name: Run Rust tests
        working-directory: _rust
        run: cargo test --release
