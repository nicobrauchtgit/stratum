name: sync-main-to-benchmark
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: benchmark
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          git config user.name  "benchmark-sync[bot]"
          git config user.email "benchmark-sync@users.noreply.github.com"
          git merge --no-edit origin/main
          git push origin benchmark